name: ci-fase5

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Preflight toolchain (friendly)
        run: |
          set -euo pipefail
          REQUIRED_JAVA_MAJOR="21"
          REQUIRED_MAVEN_MIN="3.9.0"

          JAVA_MAJOR=$(java -version 2>&1 | awk -F '[".]' '/version/ {print $2; exit}')
          MVN_VERSION=$(mvn -v | awk '/Apache Maven/ {print $3; exit}')

          if [ "${JAVA_MAJOR}" != "${REQUIRED_JAVA_MAJOR}" ]; then
            echo "::error title=Java incompatível::Esperado Java ${REQUIRED_JAVA_MAJOR}.x (LTS), encontrado Java major ${JAVA_MAJOR}."
            echo "Dica: configure actions/setup-java com java-version: '21'."
            exit 1
          fi

          if [ "$(printf '%s\n' "${REQUIRED_MAVEN_MIN}" "${MVN_VERSION}" | sort -V | head -n1)" != "${REQUIRED_MAVEN_MIN}" ]; then
            echo "::error title=Maven incompatível::Esperado Maven >= ${REQUIRED_MAVEN_MIN}, encontrado ${MVN_VERSION}."
            echo "Dica: atualize a imagem/runner ou a instalação do Maven antes de rodar os testes."
            exit 1
          fi

          echo "Toolchain OK: Java ${JAVA_MAJOR}.x, Maven ${MVN_VERSION}."

      - name: Run backend tests
        run: mvn -f backend/forca-total-api/pom.xml test

  frontend-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/prototipo-react-fase4/package-lock.json

      - name: Preflight toolchain (friendly)
        run: |
          set -euo pipefail
          REQUIRED_JAVA_MAJOR="21"
          REQUIRED_MAVEN_MIN="3.9.0"

          JAVA_MAJOR=$(java -version 2>&1 | awk -F '[".]' '/version/ {print $2; exit}')
          MVN_VERSION=$(mvn -v | awk '/Apache Maven/ {print $3; exit}')

          if [ "${JAVA_MAJOR}" != "${REQUIRED_JAVA_MAJOR}" ]; then
            echo "::error title=Java incompatível::Esperado Java ${REQUIRED_JAVA_MAJOR}.x (LTS), encontrado Java major ${JAVA_MAJOR}."
            echo "Dica: configure actions/setup-java com java-version: '21'."
            exit 1
          fi

          if [ "$(printf '%s\n' "${REQUIRED_MAVEN_MIN}" "${MVN_VERSION}" | sort -V | head -n1)" != "${REQUIRED_MAVEN_MIN}" ]; then
            echo "::error title=Maven incompatível::Esperado Maven >= ${REQUIRED_MAVEN_MIN}, encontrado ${MVN_VERSION}."
            echo "Dica: atualize a imagem/runner ou a instalação do Maven antes de rodar os testes."
            exit 1
          fi

          echo "Toolchain OK: Java ${JAVA_MAJOR}.x, Maven ${MVN_VERSION}."

      - name: Install frontend deps
        working-directory: frontend/prototipo-react-fase4
        run: npm ci

      - name: Run integration tests
        working-directory: frontend/prototipo-react-fase4
        run: npm run test:integration

  frontend-integration-real-local:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/prototipo-react-fase4/package-lock.json

      - name: Install frontend deps
        working-directory: frontend/prototipo-react-fase4
        run: npm ci

      - name: Start backend (H2) in background
        env:
          DB_URL: jdbc:h2:mem:ci_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
          DB_USERNAME: sa
          DB_PASSWORD: ''
        run: |
          nohup mvn -f backend/forca-total-api/pom.xml spring-boot:run > backend.log 2>&1 &

      - name: Wait for backend health
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8080/actuator/health >/dev/null; then
              echo "Backend up"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not start in time"
          tail -n 200 backend.log || true
          exit 1

      - name: Run real-api integration tests (strict)
        working-directory: frontend/prototipo-react-fase4
        env:
          RUN_REAL_API_TESTS: 'true'
          REAL_API_BASE_URL: http://127.0.0.1:8080
        run: npm run test:integration:real

      - name: Print backend log on failure
        if: failure()
        run: tail -n 200 backend.log || true
